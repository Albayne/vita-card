name: vitacard
description: "Privacy-first student health companion for Zimbabwean university students."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_messaging: ^14.7.19
  flutter_local_notifications: ^17.1.2
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.3
  crypto: ^3.0.3
  go_router: ^13.2.0
  fl_chart: ^0.67.0
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.3
  add_2_calendar: ^3.0.1
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.3
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
